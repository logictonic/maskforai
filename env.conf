# MaskForAI global configuration
# Used for global masking defaults and legacy single-provider fallback
MASKFORAI_UPSTREAM=https://api.anthropic.com

# System proxy — socks5h for DNS resolution through proxy
ALL_PROXY=socks5h://127.0.0.1:10808
NO_PROXY=localhost,127.0.0.1,::1

# Filter logging
MASKFORAI_LOG_FILTER=summary

# Whistledown: reversible masking
MASKFORAI_WHISTLEDOWN=true

# Web UI port (default: 8433, set to 0 to disable)
MASKFORAI_WEB_PORT=8433

# Sensitivity level: low, medium, high, paranoid (default: medium)
MASKFORAI_SENSITIVITY=medium
